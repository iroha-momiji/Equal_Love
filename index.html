<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>【非公式】=LOVE 初期メン12人沼ガイド | =LOVEファンページ</title>
  <meta name="description" content="=LOVE12人の魅力を、公式動画への導線とファン目線の言葉でたどる非公式ファンページ。" />
  <meta name="theme-color" content="#f9769f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;500;700&family=Playfair+Display:ital,wght@1,700;1,900&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Serif+JP:wght@600;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#9333ea",
            deep: "#251b21",
            canvas: "#fffafb",
            gold: "#D0A45B"
          },
          fontFamily: {
            serif: ['"Kaisei Decol"', '"Noto Serif JP"', 'serif'],
            display: ['"Playfair Display"', '"Kaisei Decol"', 'serif'],
            sans: ['"Zen Maru Gothic"', '"Noto Sans JP"', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: clamp(14px, 0.9vw + 10px, 17px);
    }

    body {
      margin: 0;
      color: #2d2429;
      font-family: "Zen Maru Gothic", "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.8;
      background: #fffafb;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    :root {
      --text-soft-xs: clamp(0.68rem, 0.62rem + 0.18vw, 0.78rem);
      --text-soft-sm: clamp(0.84rem, 0.78rem + 0.22vw, 0.96rem);
      --text-soft-base: clamp(0.95rem, 0.88rem + 0.28vw, 1.08rem);
      --text-soft-lg: clamp(1.12rem, 0.98rem + 0.52vw, 1.38rem);
      --site-pink: #f9769f;
      --site-rose: #fb4968;
      --site-gold: #d0a45b;
      --ink: #2d2429;
      --paper: #fffafb;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.94);
      --line-soft: rgba(249, 118, 159, 0.16);
      --line-strong: rgba(249, 118, 159, 0.34);
      --shadow-card: 0 22px 65px rgba(45, 36, 41, 0.09);
      --shadow-lift: 0 34px 95px rgba(249, 118, 159, 0.16);
      --radius-card: 14px;
      --radius-panel: 18px;
    }

    .fluid-copy {
      font-size: var(--text-soft-base);
    }

    .fluid-caption {
      font-size: var(--text-soft-sm);
    }

    .fluid-label {
      font-size: var(--text-soft-xs);
    }

    .readable-ja {
      line-break: strict;
      word-break: normal;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding-bottom: 0;
    }

    .glass-nav {
      background: rgba(255, 250, 252, 0.94);
      border-bottom: 1px solid rgba(249, 118, 159, 0.16);
      backdrop-filter: blur(25px);
      box-shadow: 0 10px 36px rgba(249, 118, 159, 0.08);
    }

    .dual-bg {
      background:
        linear-gradient(90deg, rgba(249, 118, 159, 0.035) 0%, rgba(208, 164, 91, 0.035) 100%),
        #fffafb;
    }

    .filter-panel {
      border: 1px solid rgba(249, 118, 159, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 55px rgba(249, 118, 159, 0.08);
    }

    .filter-control {
      border: 1px solid rgba(249, 118, 159, 0.18);
      border-radius: 8px;
      background: rgba(255, 250, 252, 0.95);
      outline: none;
      padding-inline: 0.75rem;
    }

    .filter-control:focus {
      border-color: #f9769f;
      box-shadow: 0 0 0 3px rgba(249, 118, 159, 0.14);
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(249, 118, 159, 0.35);
      outline-offset: 3px;
    }

    .member-dot {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.85);
    }

    .thumb-sharp {
      image-rendering: -webkit-optimize-contrast;
    }

    .official-home {
      background:
        radial-gradient(circle at 70% 18%, rgba(255, 255, 255, 0.9), transparent 24rem),
        radial-gradient(circle at 13% 82%, rgba(251, 73, 104, 0.16), transparent 30rem),
        linear-gradient(135deg, rgba(249, 118, 159, 0.2), rgba(255, 239, 246, 0.92) 42%, transparent 70%),
        linear-gradient(315deg, rgba(208, 164, 91, 0.14), transparent 48%),
        #fffafb;
    }

    .official-home::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(249, 118, 159, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 118, 159, 0.08) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(180deg, #000 0%, transparent 72%);
    }

    .official-home::after {
      content: "";
      position: fixed;
      inset: auto -10vw -28vh auto;
      width: 52vw;
      min-width: 420px;
      aspect-ratio: 1;
      pointer-events: none;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(249, 118, 159, 0.18), transparent 62%),
        conic-gradient(from 160deg, rgba(249, 118, 159, 0.18), rgba(208, 164, 91, 0.16), rgba(255, 255, 255, 0), rgba(249, 118, 159, 0.18));
      filter: blur(12px);
      opacity: 0.72;
    }

    .fit-title {
      display: block;
      max-width: 100%;
      white-space: nowrap;
      line-height: 1.16;
      letter-spacing: 0;
      overflow: visible;
      text-overflow: clip;
      font-size: var(--fit-fallback);
      padding-block: 0.06em;
    }

    .home-member-card {
      position: relative;
      isolation: isolate;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(255, 250, 252, 0.76)),
        rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.42s ease, border-color 0.42s ease, background 0.42s ease;
      box-shadow: 0 20px 60px rgba(249, 118, 159, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .home-member-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: inherit;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.85), rgba(249, 118, 159, 0.28), rgba(208, 164, 91, 0.16), rgba(255, 255, 255, 0.76));
      opacity: 0.56;
      transition: opacity 0.35s ease;
    }

    .home-member-card::after {
      content: attr(data-index);
      position: absolute;
      right: 1rem;
      bottom: 0.72rem;
      z-index: -1;
      font-family: "Playfair Display", serif;
      font-size: clamp(3.2rem, 7vw, 5.8rem);
      font-style: italic;
      font-weight: 900;
      line-height: 1;
      color: rgba(249, 118, 159, 0.075);
      transition: transform 0.42s ease, color 0.42s ease;
    }

    .home-member-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 88px rgba(249, 118, 159, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.95);
      border-color: rgba(249, 118, 159, 0.5);
      background: rgba(255, 255, 255, 0.92);
    }

    .home-member-card:hover::before {
      opacity: 1;
    }

    .home-member-card:hover::after {
      transform: translate3d(-0.2rem, -0.18rem, 0);
      color: rgba(249, 118, 159, 0.13);
    }

    .precision-line {
      position: relative;
    }

    .precision-line::after {
      content: "";
      position: absolute;
      inset: auto 0 -0.45rem 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249, 118, 159, 0.55), transparent);
    }

    .member-hero {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(255, 250, 252, 0.8)),
        rgba(255, 255, 255, 0.78);
      box-shadow: 0 30px 90px rgba(45, 36, 41, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .member-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(rgba(249, 118, 159, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 118, 159, 0.08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(90deg, #000, transparent 72%);
    }

    .member-hero::after {
      content: "";
      position: absolute;
      inset: -30% -20% auto auto;
      z-index: -1;
      width: min(42rem, 82vw);
      aspect-ratio: 1;
      border-radius: 999px;
      background: radial-gradient(circle, var(--hero-soft, rgba(249, 118, 159, 0.2)), transparent 62%);
      filter: blur(10px);
      opacity: 0.9;
    }

    .stat-tile {
      border: 1px solid rgba(249, 118, 159, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .group-social-link {
      border: 1px solid rgba(249, 118, 159, 0.22);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 28px rgba(249, 118, 159, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.82);
      transition: transform 0.32s ease, border-color 0.32s ease, background 0.32s ease, color 0.32s ease;
    }

    .group-social-link:hover {
      transform: translateY(-2px);
      border-color: rgba(249, 118, 159, 0.48);
      background: #2d2429;
      color: #fff;
    }

    .fan-tool-card {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(255, 250, 252, 0.72)),
        rgba(255, 255, 255, 0.74);
      box-shadow: 0 18px 54px rgba(45, 36, 41, 0.07), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .fan-tool-card:hover {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-lift);
    }

    .fan-tool-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 12% 12%, rgba(249, 118, 159, 0.16), transparent 36%),
        radial-gradient(circle at 88% 10%, rgba(208, 164, 91, 0.12), transparent 30%);
      opacity: 0.72;
    }

    .relation-line {
      background:
        linear-gradient(90deg, rgba(249, 118, 159, 0.1), rgba(249, 118, 159, 0.58), rgba(208, 164, 91, 0.32), rgba(249, 118, 159, 0.1));
    }

    .enterprise-section {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-panel);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 250, 252, 0.72)),
        var(--surface);
      box-shadow: var(--shadow-card);
    }

    .service-card {
      display: flex;
      min-height: 9.2rem;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 252, 0.72)),
        rgba(255, 255, 255, 0.78);
      padding: 1.1rem;
      text-align: left;
      box-shadow: 0 16px 42px rgba(45, 36, 41, 0.07);
      transition: transform 0.34s ease, box-shadow 0.34s ease, border-color 0.34s ease;
    }

    .service-card:hover {
      transform: translateY(-5px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-lift);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      padding: 0.28rem 0.62rem;
      color: #8f6f7c;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .chemistry-shell {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-panel);
      background: rgba(255, 255, 255, 0.66);
      box-shadow: var(--shadow-card);
    }

    .chemistry-grid {
      display: grid;
      grid-template-columns: minmax(5.8rem, 0.82fr) repeat(12, minmax(2.6rem, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid rgba(249, 118, 159, 0.12);
      border-radius: 12px;
      background: rgba(249, 118, 159, 0.16);
    }

    .chemistry-header,
    .chemistry-row-head,
    .chemistry-cell,
    .chemistry-diagonal {
      min-height: 2.85rem;
      background: rgba(255, 255, 255, 0.9);
    }

    .chemistry-header,
    .chemistry-row-head {
      display: grid;
      place-items: center;
      padding: 0.3rem;
      color: #8f6f7c;
      font-size: clamp(0.56rem, 0.48rem + 0.18vw, 0.72rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .chemistry-row-head {
      justify-items: start;
      padding-inline: 0.65rem;
      color: #2d2429;
    }

    .chemistry-cell {
      position: relative;
      display: grid;
      place-items: center;
      border: 0;
      color: #c86b88;
      font-size: clamp(0.54rem, 0.48rem + 0.14vw, 0.66rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.2;
      overflow: hidden;
      padding: 0.22rem;
      text-align: center;
      word-break: keep-all;
      transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }

    .chemistry-cell:hover,
    .chemistry-cell.is-selected {
      z-index: 2;
      background: linear-gradient(135deg, #2d2429, #fb4968);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 16px 36px rgba(45, 36, 41, 0.18);
    }

    .chemistry-diagonal {
      background:
        repeating-linear-gradient(135deg, rgba(249, 118, 159, 0.06), rgba(249, 118, 159, 0.06) 6px, rgba(255, 255, 255, 0.72) 6px, rgba(255, 255, 255, 0.72) 12px);
    }

    .relation-member-picker {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(10.5rem, 1fr));
      gap: 0.65rem;
    }

    .relation-member-button {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      padding: 0.95rem;
      text-align: left;
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
    }

    .relation-member-button::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 3px;
      background: var(--member-accent, #f9769f);
      transform: scaleX(0.24);
      transform-origin: left;
      transition: transform 0.24s ease;
    }

    .relation-member-button:hover,
    .relation-member-button.is-selected {
      transform: translateY(-3px);
      border-color: rgba(249, 118, 159, 0.3);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 46px rgba(45, 36, 41, 0.12);
    }

    .relation-member-button.is-selected::after,
    .relation-member-button:hover::after {
      transform: scaleX(1);
    }

    .chemistry-list-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 252, 0.78)),
        radial-gradient(circle at var(--mx, 22%) var(--my, 0%), rgba(249, 118, 159, 0.12), transparent 34%);
      box-shadow: var(--shadow-card);
      transition: transform 0.26s ease, border-color 0.26s ease, box-shadow 0.26s ease;
    }

    .chemistry-list-card:hover {
      transform: translateY(-4px);
      border-color: rgba(249, 118, 159, 0.32);
      box-shadow: 0 28px 70px rgba(45, 36, 41, 0.14);
    }

    .chemistry-list-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--left-accent, #f9769f), var(--right-accent, #d0a45b));
    }

    .mono-action-primary {
      border-color: #2d2429 !important;
      background: #2d2429 !important;
      color: #fff !important;
    }

    .timeline-board {
      position: relative;
    }

    .timeline-board::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 1.15rem;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(249, 118, 159, 0.35), rgba(208, 164, 91, 0.28), transparent);
    }

    .timeline-year {
      position: sticky;
      top: 6rem;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      padding: 0.45rem 0.85rem;
      color: #2d2429;
      box-shadow: 0 16px 42px rgba(45, 36, 41, 0.08);
      backdrop-filter: blur(14px);
    }

    @media (max-width: 767px) {
      .timeline-board::before {
        left: 0.35rem;
      }
    }

    .badge-card {
      border: 1px solid rgba(249, 118, 159, 0.14);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
      transition: transform 0.3s ease, opacity 0.3s ease, border-color 0.3s ease;
    }

    .badge-card.is-locked {
      opacity: 0.46;
    }

    .badge-card:not(.is-locked):hover {
      transform: translateY(-2px);
      border-color: rgba(249, 118, 159, 0.34);
    }

    .video-card {
      border: 1px solid rgba(249, 118, 159, 0.12);
      border-radius: 12px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.84), rgba(255, 250, 252, 0.68)),
        rgba(255, 255, 255, 0.66);
      padding: 0.75rem;
      box-shadow: 0 14px 42px rgba(45, 36, 41, 0.06);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .video-card:hover {
      transform: translateY(-6px);
      border-color: rgba(249, 118, 159, 0.28);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 28px 74px rgba(45, 36, 41, 0.12);
    }

    .play-badge {
      position: absolute;
      inset: 50% auto auto 50%;
      display: grid;
      width: 3.15rem;
      height: 3.15rem;
      place-items: center;
      border-radius: 999px;
      color: white;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.86);
      transition: opacity 0.32s ease, transform 0.32s ease;
      box-shadow: 0 18px 48px rgba(45, 36, 41, 0.26);
    }

    .video-card:hover .play-badge {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .soft-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(249, 118, 159, 0.16);
      border-radius: 999px;
      background: rgba(255, 250, 252, 0.88);
      padding: 0.28rem 0.58rem;
      color: #8f6f7c;
    }

    .section-card {
      border: 1px solid rgba(249, 118, 159, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 22px 65px rgba(45, 36, 41, 0.09);
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .thumb {
      image-rendering: -webkit-optimize-contrast;
      background: #e4e4e7;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-100%);
      }
      to {
        transform: translateX(100%);
      }
    }

    .thumb-shimmer {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.75), transparent),
        linear-gradient(135deg, #f8d7e2, #fffafb);
      transform: translateX(-100%);
      animation: shimmer 1.25s ease-in-out infinite;
      transition: opacity 0.35s ease;
    }

    .thumb.is-loaded .thumb-shimmer {
      opacity: 0;
      animation-play-state: paused;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {

        menu: "M4 6h16M4 12h16M4 18h16",
        x: "M18 6L6 18M6 6l12 12",
        users: "M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75",
        heart: "M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78",
        external: "M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"
      };
      return paths[name];
    }

    function Icon({ name, className = "h-4 w-4" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill={name === "play" ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d={iconPath(name)} />
        </svg>
      );
    }

    function FitTitle({ text, className = "", max = 128, min = 28, as: Tag = "span", style = {} }) {
      const ref = useRef(null);
      const [measuredSize, setMeasuredSize] = useState(null);
      const vw = Math.max(4.2, Math.min(11, 132 / Math.max(text.length, 1)));

      useLayoutEffect(() => {
        const element = ref.current;
        if (!element) return;

        const fit = () => {
          const parentWidth = element.parentElement?.clientWidth || element.clientWidth;
          if (!parentWidth) return;

          const computed = window.getComputedStyle(element);
          const probe = document.createElement("span");
          probe.textContent = text;
          probe.style.position = "absolute";
          probe.style.visibility = "hidden";
          probe.style.whiteSpace = "nowrap";
          probe.style.fontFamily = computed.fontFamily;
          probe.style.fontWeight = computed.fontWeight;
          probe.style.fontStyle = computed.fontStyle;
          probe.style.letterSpacing = computed.letterSpacing;
          probe.style.fontSize = `${max}px`;
          document.body.appendChild(probe);

          const width = probe.scrollWidth || 1;
          probe.remove();

          const nextSize = Math.max(min, Math.min(max, Math.floor(max * (parentWidth - 2) / width)));
          setMeasuredSize((current) => current === nextSize ? current : nextSize);
        };

        fit();
        const observer = new ResizeObserver(fit);
        observer.observe(element.parentElement || element);
        window.addEventListener("resize", fit);
        return () => {
          observer.disconnect();
          window.removeEventListener("resize", fit);
        };
      }, [text, max, min, className]);

      return (
        <Tag
          ref={ref}
          className={`fit-title ${className}`}
          style={{
            ...style,
            "--fit-fallback": `clamp(${min}px, ${vw}vw, ${max}px)`,
            fontSize: measuredSize ? `${measuredSize}px` : style.fontSize
          }}
          title={text}
        >
          {text}
        </Tag>
      );
    }

    function runUiTransition(update) {
      if (document.startViewTransition && ReactDOM.flushSync) {
        document.startViewTransition(() => ReactDOM.flushSync(update));
        return;
      }
      update();
    }

    function loadWatchedIds() {
      const next = safeJson(localStorage.getItem(STORAGE_KEY), null);
      if (Array.isArray(next)) {
        return next;
      }

      const legacyPairs = [
        ["watched_iori_v5", "iori"],
        ["watched_hana_v5", "hana"],
        ["watched_maika_v5", "maika"]
      ];

      const migrated = new Set();
      legacyPairs.forEach(([key, memberId]) => {
        safeJson(localStorage.getItem(key), []).forEach((legacyId) => {
          const offset = memberId === "iori" ? 0 : memberId === "hana" ? 15 : 30;
          const localIndex = Number(legacyId) - offset;
          if (Number.isInteger(localIndex) && localIndex >= 1 && localIndex <= 15) {
            migrated.add(`${memberId}-${localIndex}`);
          }
        });
      });
      return Array.from(migrated);
    }

    function safeJson(value, fallback) {
      try {
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function memberProgress(memberId, watchedIds) {
      const total = VIDEO_DATA.filter((video) => video.memberId === memberId).length;
      const watched = VIDEO_DATA.filter((video) => video.memberId === memberId && watchedIds.includes(video.id)).length;
      return { total, watched, percent: total ? Math.round((watched / total) * 100) : 0 };
    }

    function badgeStates(watchedIds, memberId) {
      return BADGE_RULES.map((badge) => ({
        ...badge,
        unlocked: badge.test({ watchedIds, memberId })
      }));
    }

    function videoSourceByKey(videoKey) {
      if (!videoKey || !VIDEO_LIBRARY[videoKey]) return null;
      const source = VIDEO_LIBRARY[videoKey];
      return {
        ...source,
        libraryKey: videoKey,
        url: `https://www.youtube.com/watch?v=${source.youtubeId}`
      };
    }

    function firstMemberVideo(memberId, videoKey) {
      return VIDEO_DATA.find((video) => video.memberId === memberId && video.libraryKey === videoKey) || VIDEO_DATA.find((video) => video.libraryKey === videoKey);
    }

    function BreakableTitle({ title, as: Tag = "span", className = "" }) {
      const match = title.match(/^(.*?)([（(].*)$/);
      if (!match) return <Tag className={className}>{title}</Tag>;
      return (
        <Tag className={className}>
          <span className="block">{match[1].trim()}</span>
          <span className="block">{match[2].trim()}</span>
        </Tag>
      );
    }

    function Thumbnail({ video }) {
      const [src, setSrc] = useState(`https://i.ytimg.com/vi/${video.youtubeId}/maxresdefault.jpg`);
      const [loaded, setLoaded] = useState(false);
      useEffect(() => {
        setLoaded(false);
        setSrc(`https://i.ytimg.com/vi/${video.youtubeId}/maxresdefault.jpg`);
      }, [video.youtubeId]);
      return (
        <div className={`thumb relative aspect-video overflow-hidden rounded-[8px] bg-zinc-200 shadow-[0_18px_42px_rgba(45,36,41,0.10)] ${loaded ? "is-loaded" : ""}`}>
          <span className="thumb-shimmer" aria-hidden="true"></span>
          <img
            src={src}
            alt={`${video.title}のサムネイル`}
            loading="lazy"
            className={`h-full w-full object-cover transition-all duration-500 group-hover:scale-105 ${loaded ? "opacity-100" : "opacity-0"}`}
            onLoad={() => setLoaded(true)}
            onError={() => {
              if (!src.includes("hqdefault")) {
                setSrc(`https://i.ytimg.com/vi/${video.youtubeId}/hqdefault.jpg`);
              }
            }}
          />
        </div>
      );
    }

    function LegacyTopNav({ member, setMember, page, setPage, view, setView, resetFilters }) {
      const current = MEMBER_BY_ID[member];
      const [menuOpen, setMenuOpen] = useState(false);
      const viewLabel = {
        home: "Top",
        relations: "Relations",
        timeline: "Timeline",
        firsttime: "First Guide",
        badges: "Badges",
        privacy: "Policy"
      };
      const currentLocation = view === "member"
        ? `${current.name.replace(" ", "")} / ${page === "about" ? "Profile" : "Archive"}`
        : viewLabel[view] || "Guide";

      useEffect(() => {
        if (!menuOpen) return undefined;
        const handleKeyDown = (event) => {
          if (event.key === "Escape") setMenuOpen(false);
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [menuOpen]);

      const closeAndScroll = () => {
        setMenuOpen(false);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const goHome = () => {
        runUiTransition(() => setView("home"));
        closeAndScroll();
      };

      const goMemberPage = (nextPage) => {
        runUiTransition(() => {
          setView("member");
          setPage(nextPage);
          if (nextPage === "works") resetFilters();
        });
        closeAndScroll();
      };

      const goTool = (nextView) => {
        runUiTransition(() => setView(nextView));
        closeAndScroll();
      };

      const chooseMember = (id) => {
        const nextPage = view === "member" ? page : "works";
        runUiTransition(() => {
          setMember(id);
          setView("member");
          setPage(nextPage);
          if (nextPage === "works") resetFilters();
        });
        closeAndScroll();
      };

      return (
        <>
          <nav className="glass-nav fixed top-0 z-[1000] flex w-full items-center justify-between gap-4 px-5 py-4 md:px-8">
            <button onClick={goHome} className="min-w-0 text-left" aria-label="トップへ戻る">
            <span className="block truncate font-serif text-xl font-bold text-[#2d2429] md:text-2xl">=LOVE</span>
              <span className="block truncate fluid-label font-bold tracking-[0.16em] text-[#8f6f7c]">初期メン12人沼ガイド</span>
            </button>
            <div className="flex min-w-0 items-center gap-3">
              <span className="hidden max-w-[42vw] truncate rounded-full bg-white/80 px-3 py-1 fluid-label font-bold tracking-[0.12em] text-[#8f6f7c] shadow-[0_8px_22px_rgba(249,118,159,0.10)] sm:block">{currentLocation}</span>
              <button
                type="button"
                onClick={() => setMenuOpen((open) => !open)}
                className="inline-flex h-12 w-12 items-center justify-center rounded-full bg-[#2d2429] text-white shadow-[0_16px_36px_rgba(45,36,41,0.18)] transition hover:-translate-y-0.5 hover:bg-[#f9769f]"
                aria-label={menuOpen ? "ナビゲーションを閉じる" : "ナビゲーションを開く"}
                aria-expanded={menuOpen}
                aria-controls="global-menu"
              >
                <Icon name={menuOpen ? "x" : "menu"} className="h-5 w-5" />
              </button>
            </div>
          </nav>

          {menuOpen && (
            <div className="fixed inset-0 z-[999] bg-[#2d2429]/35 px-4 pt-24 backdrop-blur-sm md:px-8" onClick={() => setMenuOpen(false)}>
              <div id="global-menu" className="mx-auto max-h-[calc(100vh-7rem)] max-w-6xl overflow-y-auto rounded-[18px] border border-[#f6dce5] bg-white/95 p-5 shadow-[0_34px_95px_rgba(45,36,41,0.22)] md:p-7" onClick={(event) => event.stopPropagation()}>
                <div className="mb-6 flex flex-wrap items-center justify-between gap-3">
                  <div>
                    <p className="fluid-label font-bold tracking-[0.18em] text-[#c86b88]">Navigation</p>
                    <p className="mt-1 fluid-caption font-bold text-[#6f5b65]">{currentLocation}</p>
                  </div>
                  <button onClick={() => setMenuOpen(false)} className="rounded-full border border-[#f8d7e2] bg-white px-4 py-2 fluid-label font-bold tracking-[0.12em] text-[#2d2429]">閉じる</button>
                </div>
                <div className="grid gap-5 lg:grid-cols-[0.86fr_1.14fr]">
                  <section className="rounded-[14px] border border-[#f8d7e2] bg-[#fffafb] p-4">
                    <p className="mb-3 fluid-label font-bold tracking-[0.16em] text-[#c86b88]">Pages</p>
                    <div className="grid gap-2 sm:grid-cols-2 lg:grid-cols-1">
                      {[
                        ["Top", goHome, view === "home"],
                        ["Profile", () => goMemberPage("about"), view === "member" && page === "about"],
                        ["Archive", () => goMemberPage("works"), view === "member" && page === "works"],
                        ["Relations", () => goTool("relations"), view === "relations"],
                        ["Timeline", () => goTool("timeline"), view === "timeline"],
                        ["First Guide", () => goTool("firsttime"), view === "firsttime"],
                        ["Badges", () => goTool("badges"), view === "badges"],
                        ["Policy", () => goTool("privacy"), view === "privacy"]
                      ].map(([label, action, active]) => (
                        <button key={label} onClick={action} className={`flex items-center justify-between rounded-[10px] px-4 py-3 text-left text-sm font-bold tracking-[0.08em] transition ${active ? "bg-[#2d2429] text-white" : "bg-white text-[#2d2429] hover:bg-[#ffeef5]"}`}>
                          <span>{label}</span>
                          {active && <span className="text-[10px] tracking-[0.14em] text-white/65">NOW</span>}
                        </button>
                      ))}
                    </div>
                  </section>
                  <section className="rounded-[14px] border border-[#f8d7e2] bg-[#fffafb] p-4">
                    <p className="mb-3 fluid-label font-bold tracking-[0.16em] text-[#c86b88]">Members</p>
                    <div className="grid gap-2 sm:grid-cols-2 xl:grid-cols-3">
                      {MEMBERS.map((item) => {
                        const active = item.id === member;
                        return (
                          <button key={item.id} onClick={() => chooseMember(item.id)} className={`group rounded-[10px] border px-4 py-3 text-left transition hover:-translate-y-0.5 ${active ? "border-[#2d2429] bg-white shadow-[0_12px_28px_rgba(45,36,41,0.10)]" : "border-[#f8d7e2] bg-white/78 hover:bg-white"}`}>
                            <span className="mb-2 block h-1 w-12 rounded-full transition-all group-hover:w-20" style={{ background: memberAccent(item) }}></span>
                            <span className="block truncate font-serif text-xl font-bold text-[#2d2429]">{item.name.replace(" ", "")}</span>
                            <span className="mt-1 block truncate fluid-label font-bold tracking-[0.08em] text-[#8f6f7c]">{item.en}</span>
                          </button>
                        );
                      })}
                    </div>
                  </section>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
