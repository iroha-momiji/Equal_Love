      return (
        <section className="filter-panel relative z-10 mb-16 px-4 py-5 md:px-6">
          <div className="mx-auto mb-4 flex max-w-6xl flex-wrap items-center justify-between gap-3">
            <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">絞り込み</p>
            <p className="rounded-full bg-white/80 px-3 py-1 fluid-label font-bold text-[#8f6f7c] shadow-[0_8px_24px_rgba(249,118,159,0.10)]">{filteredCount}件表示中</p>
          </div>
          <div className="mx-auto grid max-w-6xl gap-4 md:grid-cols-[1.2fr_0.7fr_0.7fr_auto_auto] md:items-end">
            <label className="block">
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">さがす</span>
              <input
                value={searchQuery}
                onChange={(event) => setSearchQuery(event.target.value)}
                placeholder="タイトル・コメントで検索"
                className="filter-control h-10 w-full text-sm font-bold text-[#2d2429] placeholder:text-zinc-300"
              />
            </label>
            <label className="block">
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">種類</span>
              <select value={selectedType} onChange={(event) => setSelectedType(event.target.value)} className="filter-control h-10 w-full text-sm font-bold text-[#2d2429]">
                {TYPES.map((type) => <option key={type} value={type}>{type}</option>)}
              </select>
            </label>
            <label className="block">
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">タグ</span>
              <select value={selectedTag} onChange={(event) => setSelectedTag(event.target.value)} className="filter-control h-10 w-full text-sm font-bold text-[#2d2429]">
                {TAGS.map((tag) => <option key={tag} value={tag}>{tag}</option>)}
              </select>
            </label>
            <label className="flex h-10 items-center gap-2 text-xs font-bold tracking-[0.12em] text-[#8f6f7c]">
              <input type="checkbox" checked={showWatchedOnly} onChange={(event) => setShowWatchedOnly(event.target.checked)} className="h-4 w-4 accent-[#f9769f]" />
              視聴済み
            </label>
            <button onClick={resetFilters} className="h-10 border-b border-[#f9769f] px-1 text-xs font-bold tracking-[0.16em] text-[#2d2429] transition-opacity hover:opacity-50">
              リセット
            </button>
          </div>
        </section>
      );
    }

    function LegacyVideoGrid({ videos, current, watchedIds, toggleWatched }) {
      if (videos.length === 0) {
        return (
          <div className="mx-auto max-w-3xl rounded-[8px] border border-[#f8d7e2] bg-white p-12 text-center shadow-[0_18px_45px_rgba(249,118,159,0.10)]">
            <p className="font-serif text-2xl font-bold text-[#2d2429]">該当する動画がありません</p>
            <p className="mt-3 text-sm font-normal leading-7 text-zinc-500">検索語や絞り込みを少しゆるめて、もう一度探してみてください。</p>
          </div>
        );
      }

      return (
        <div className="grid grid-cols-1 gap-x-14 gap-y-28 md:grid-cols-2 lg:grid-cols-3">
          {videos.map((video, index) => {
            const watched = watchedIds.includes(video.id);
            return (
              <article key={video.id} className="video-card page-card group" style={{ "--stagger": `${Math.min(index, 8) * 36}ms` }}>
                <div className="relative mb-9">
                  <a href={video.url} target="_blank" rel="noreferrer" className="block" aria-label={`${video.title}をYouTubeで観る`}>
                    <Thumbnail video={video} />
                    <span className="play-badge" style={{ background: memberAccent(current, 135) }}>
                      <Icon name="play" className="h-5 w-5 translate-x-0.5" />
                    </span>
                  </a>
                  <div className="absolute -left-3 -top-3 rounded-[8px] px-4 py-2 text-[10px] font-black uppercase tracking-widest text-white shadow-lg" style={{ background: memberAccent(current) }}>{video.type}</div>
                  {watched && (
                    <div className="absolute right-3 top-3 rounded-full bg-white/92 px-3 py-1 text-[10px] font-bold tracking-[0.12em] shadow-[0_10px_26px_rgba(45,36,41,0.12)]" style={{ color: memberColor(current) }}>
                      視聴済み
                    </div>
                  )}
                  <button
                    onClick={() => toggleWatched(video.id)}
                    className={`absolute -bottom-5 -right-5 flex h-14 w-14 items-center justify-center rounded-full text-xl shadow-2xl ring-8 ring-white transition-all hover:scale-105 ${watched ? "text-white" : "bg-white text-zinc-300"}`}
                    style={{ background: watched ? memberAccent(current, 135) : undefined }}
                    title={watched ? "視聴済みを解除" : "視聴済みにする"}
                    aria-label={watched ? "視聴済みを解除" : "視聴済みにする"}
                  >
                    {watched ? "✓" : "＋"}
                  </button>
                </div>
                <div className="space-y-5">
                  <div className="flex items-center justify-between gap-3 fluid-label font-bold tracking-[0.12em] text-[#c86b88]">
                    <span>{video.watchPoint}</span>
                    <span className="text-zinc-300">{video.date}</span>
                  </div>
                  <BreakableTitle title={video.title} as="h3" className="font-serif text-2xl font-bold leading-snug text-[#2d2429] transition-colors md:text-3xl group-hover:text-[#c86b88]" />
                  <p className="line-clamp-3 text-[15px] font-normal leading-[2.1] text-zinc-500">{video.comment}</p>
                  <div className="flex flex-wrap gap-2 fluid-label font-bold tracking-[0.08em]">
                    {video.tags.slice(0, 3).map((tag) => <span key={tag} className="soft-chip">#{tag}</span>)}
                  </div>
                  <a href={video.url} target="_blank" rel="noreferrer" className={`inline-flex items-center gap-2 rounded-full border-2 px-4 py-2 fluid-label font-bold tracking-[0.14em] text-white shadow-[0_12px_28px_rgba(45,36,41,0.12)] transition hover:-translate-y-0.5 hover:opacity-90 ${isMonoMember(current) ? "mono-action-primary" : ""}`} style={memberActionStyle(current)} data-member-action={current.id}>
                    <Icon name="play" className="h-3.5 w-3.5" />
                    YouTubeで観る
                  </a>
                </div>
              </article>
            );
          })}
        </div>
      );
    }

    function LegacyProfile({ current, videos }) {
      return (
        <div className="mx-auto max-w-6xl animate-in">
          <div className="section-card relative flex flex-col gap-16 overflow-hidden p-10 md:flex-row md:p-20">
            <div className="absolute inset-x-0 top-0 h-1.5" style={{ background: memberAccent(current) }}></div>
            <div className="relative z-10 space-y-12 md:w-5/12">
              <div>
                <p className="mb-4 text-[10px] font-bold tracking-[0.24em] text-[#c7a5b1]">プロフィール</p>
                <FitTitle text={current.name.replace(" ", "")} as="h2" max={64} min={30} className="font-serif font-bold" style={{ color: memberColor(current) }} />
                <p className="mt-3 text-sm font-bold text-[#8f6f7c]">{current.en}</p>
              </div>
              <dl className="space-y-5 text-sm">
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">ステータス</dt><dd className="text-right font-bold">{current.status || "現メンバー"} / </dd></div>
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">メンバーカラー</dt><dd className="text-right font-bold">{current.colorName}</dd></div>
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">誕生日</dt><dd className="text-right font-bold">{current.birth}</dd></div>
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">血液型 / 星座</dt><dd className="text-right font-bold">{current.blood} / {current.sign}</dd></div>
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">身長 / 出身地</dt><dd className="text-right font-bold">{current.height} / {current.place}</dd></div>
                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">おすすめ</dt><dd className="text-right font-bold">{videos.length}本</dd></div>
              </dl>
              <div className="space-y-4 rounded-[8px] border border-[#f8d7e2] bg-[#fffafb] p-5">
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">公式プロフィールから拾える入口</p>
                <dl className="space-y-3 text-sm leading-7 text-[#6f5963]">
                  <div>
                    <dt className="font-bold text-[#2d2429]">趣味</dt>
                    <dd>{current.hobby}</dd>
                  </div>
                  <div>
                    <dt className="font-bold text-[#2d2429]">特技</dt>
                    <dd>{current.skill}</dd>
                  </div>
                  {current.qualification && (
                    <div>
                      <dt className="font-bold text-[#2d2429]">資格</dt>
                      <dd>{current.qualification}</dd>
                    </div>
                  )}
                </dl>
              </div>
              <div className="space-y-3">
                <p className="font-serif text-xl font-bold" style={{ color: memberColor(current) }}>好きポイント</p>
                <div className="flex flex-wrap gap-2">
                  {current.notes.map((note) => (
                    <span key={note} className="soft-chip fluid-label font-bold">#{note}</span>
                  ))}
                </div>
              </div>
              <div className="space-y-3 border-t border-zinc-100 pt-8">
                <p className="font-serif text-xl font-bold" style={{ color: memberColor(current) }}>公式SNS・公開コンテンツ</p>
                <div className="grid gap-3">
                  {current.socials.map((social) => (
                    <a key={social.label} href={social.url} target="_blank" rel="noreferrer" className="rounded-[8px] border-2 px-6 py-3 text-center text-[11px] font-bold tracking-[0.16em] transition-all hover:text-white" style={{ borderColor: current.hexColor, color: current.hexColor }} onMouseEnter={(event) => { event.currentTarget.style.background = current.hexColor; event.currentTarget.style.color = "#fff"; }} onMouseLeave={(event) => { event.currentTarget.style.background = "transparent"; event.currentTarget.style.color = current.hexColor; event.currentTarget.style.borderColor = current.hexColor; }}>
                      {social.label} →
                    </a>
                  ))}
                </div>
              </div>
            </div>
            <div className="relative z-10 md:w-7/12">
              <p className="readable-ja mb-10 rounded-r-[8px] border-l-8 bg-[#fffafb] px-7 py-5 font-serif text-[clamp(1.35rem,1rem+1.15vw,1.9rem)] font-bold leading-relaxed text-[#2d2429]" style={{ borderColor: memberColor(current) }}>
                {current.catchcopy}
              </p>
              <p className="readable-ja fluid-copy font-normal leading-[2.25] text-zinc-600">{current.profile}</p>
              <div className="mt-10 grid gap-3 border-t border-zinc-100 pt-8">
                <p className="mb-1 fluid-label font-bold tracking-[0.16em] text-[#c86b88]">まず観たい3本</p>
                {videos.slice(0, 3).map((video) => (
                  <a key={video.id} href={video.url} target="_blank" rel="noreferrer" className="flex items-center justify-between gap-4 border-b border-zinc-50 pb-3 text-sm transition-opacity hover:opacity-60">
                    <BreakableTitle title={video.title} className="min-w-0 font-bold leading-snug text-[#2d2429]" />
                    <span className="shrink-0 text-[10px] font-black uppercase tracking-widest text-zinc-300">{video.type}</span>
                  </a>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ToolHeader({ eyebrow, title, copy }) {
      return (
        <header className="mx-auto mb-12 max-w-5xl text-center">
          <p className="mb-4 fluid-label font-bold tracking-[0.24em] text-[#c86b88]">{eyebrow}</p>
          <FitTitle text={title} as="h1" max={72} min={32} className="mx-auto font-serif font-bold text-[#2d2429]" />
          <p className="readable-ja mx-auto mt-5 max-w-2xl fluid-copy font-normal leading-8 text-[#6f5b65]">{copy}</p>
        </header>
      );
    }

    function RelationsView({ member, setMember, setPage, setView, resetFilters }) {
      const [baseMemberId, setBaseMemberId] = useState(member || MEMBERS[0].id);

      useEffect(() => {
        if (member && MEMBER_BY_ID[member]) setBaseMemberId(member);
      }, [member]);

      const baseMember = MEMBER_BY_ID[baseMemberId] || MEMBERS[0];
      const basePairs = CHEMISTRY_PAIRS
        .filter((pair) => pair.members.includes(baseMember.id))
        .sort((a, b) => {
          const aOther = a.members.find((id) => id !== baseMember.id);
          const bOther = b.members.find((id) => id !== baseMember.id);
          return MEMBERS.findIndex((item) => item.id === aOther) - MEMBERS.findIndex((item) => item.id === bOther);
        });

      const openProfile = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("about");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const openArchive = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("works");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const renderPairCard = (pair, index) => {
        const otherId = pair.members.find((id) => id !== baseMember.id);
        const other = MEMBER_BY_ID[otherId];
        const relationVideos = pair.videoKeys.map((videoKey) => videoSourceByKey(videoKey)).filter(Boolean).slice(0, 3);
        return (
          <article
            key={pair.id}
            data-chemistry-pair={pair.id}
            className="chemistry-list-card p-5 md:p-6"
            style={{
              "--stagger": `${index * 28}ms`,
              "--left-accent": memberColor(baseMember),
              "--right-accent": memberColor(other)
            }}
          >
            <div className="flex flex-wrap items-start justify-between gap-4">
              <div className="min-w-0">
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">{baseMember.short} × {other.short}</p>
                <h2 className="mt-2 font-serif text-[clamp(1.45rem,1.05rem+0.9vw,2.15rem)] font-bold leading-tight text-[#2d2429]">{pair.label}</h2>
              </div>
              <span className="rounded-full bg-[#2d2429] px-3 py-1 fluid-label font-bold tracking-[0.12em] text-white">{pair.type}</span>
            </div>
            <p className="readable-ja mt-4 fluid-caption font-normal leading-7 text-[#6f5b65]">{pair.description}</p>
            <div className="mt-5 rounded-[10px] border border-[#f8d7e2] bg-white/72 p-4">
              <p className="fluid-label font-bold tracking-[0.14em] text-[#c86b88]">由来</p>
              <p className="readable-ja mt-2 text-xs font-bold leading-6 text-[#6f5b65]">{pair.nameOrigin}</p>
              {pair.nameSource !== "由来メモ" && (
                <p className="mt-2 text-[10px] font-bold tracking-[0.12em] text-[#8f6f7c]">確認元: {pair.nameSource}</p>
              )}
            </div>
            <div className="mt-4 flex flex-wrap gap-2">
              {pair.tags.map((tag) => <span key={tag} className="soft-chip fluid-label font-bold">#{tag}</span>)}
            </div>
            <div className="mt-6 grid gap-2">
              <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">この関係性で見る場面</p>
              {relationVideos.map((video) => (
                <a key={video.libraryKey} href={video.url} target="_blank" rel="noreferrer" className="flex items-center justify-between gap-3 rounded-[8px] border border-[#f8d7e2] bg-white/78 px-4 py-3 text-sm font-bold text-[#2d2429] transition hover:-translate-y-0.5 hover:bg-white">
                  <BreakableTitle title={video.title} className="min-w-0" />
                  <span className="shrink-0 text-[10px] tracking-[0.14em] text-[#c86b88]">{video.type}</span>
                </a>
              ))}
            </div>
            <div className="mt-6 flex flex-wrap gap-2">
              <button
                type="button"
                onClick={() => openProfile(other.id)}
                className="rounded-full border-2 bg-white px-4 py-2 fluid-label font-bold tracking-[0.12em] transition hover:-translate-y-0.5"
                style={{ borderColor: other.hexColor, color: other.hexColor }}
              >
                {other.short} Profile
              </button>
              <button
                type="button"
                onClick={() => openArchive(other.id)}
                className={`rounded-full border-2 px-4 py-2 fluid-label font-bold tracking-[0.12em] transition hover:-translate-y-0.5 ${isMonoMember(other) ? "mono-action-primary" : ""}`}
                style={memberActionStyle(other)}
                data-member-action={other.id}
              >
                {other.short} Archive
              </button>
            </div>
          </article>
        );
      };

      return (
        <main className="page-transition mx-auto max-w-[100vw] overflow-x-hidden px-6 pb-10 pt-40 md:max-w-7xl md:pt-44">
          <ToolHeader eyebrow="Fan Tools / Relations" title="基軸メンバーで見る関係性" copy="メンバーを1人選ぶと、その人を起点にした11通りの関係性が並びます。表ではなく、相手ごとの温度と見どころで辿るケミ一覧です。" />
          <section className="mb-8 grid gap-4 md:grid-cols-3">
            {RELATION_GROUPS.slice(0, 3).map((group, index) => (
              <div key={group.id} className="enterprise-section page-card p-5" style={{ "--stagger": `${index * 35}ms` }}>
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">{group.type}</p>
                <h2 className="mt-2 font-serif text-2xl font-bold text-[#2d2429]">{group.label}</h2>
                <p className="readable-ja mt-2 text-xs font-bold leading-6 text-[#8f6f7c]">{group.description}</p>
              </div>
            ))}
          </section>
          <section className="chemistry-shell p-4 md:p-6">
            <div className="mb-5 flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">基軸メンバー</p>
                <p className="mt-1 fluid-caption font-bold text-[#6f5b65]">{baseMember.name.replace(" ", "")}から見る11通り</p>
              </div>
              <p className="status-pill fluid-label font-bold">66 PAIRS / 12 MEMBERS</p>
            </div>
            <div className="relation-member-picker">
              {MEMBERS.map((item) => (
                <button
                  key={item.id}
                  type="button"
                  onClick={() => setBaseMemberId(item.id)}
                  className={`relation-member-button ${baseMember.id === item.id ? "is-selected" : ""}`}
                  style={{ "--member-accent": memberColor(item) }}
                  data-relation-base={item.id}
                >
                  <span className="block truncate font-serif text-xl font-bold text-[#2d2429]">{item.name.replace(" ", "")}</span>
                  <span className="mt-1 block truncate fluid-label font-bold tracking-[0.08em] text-[#8f6f7c]">{item.en}</span>
                </button>
              ))}
            </div>
          </section>
          <section className="mt-8 grid gap-5 lg:grid-cols-2">
            {basePairs.map((pair, index) => renderPairCard(pair, index))}
          </section>
        </main>
      );
    }

    function TimelineView({ setMember, setPage, setView, resetFilters }) {
      const [timelineMember, setTimelineMember] = useState("all");
      const [timelineYear, setTimelineYear] = useState("all");
      const [timelineType, setTimelineType] = useState("all");
      const years = ["all", ...Array.from(new Set(TIMELINE_EVENTS.map((event) => event.year))).sort()];
      const types = ["all", ...Array.from(new Set(TIMELINE_EVENTS.map((event) => event.type))).sort()];
      const events = TIMELINE_EVENTS.filter((event) => {
        if (timelineMember !== "all" && !event.memberIds.includes(timelineMember)) return false;
        if (timelineYear !== "all" && event.year !== timelineYear) return false;
        if (timelineType !== "all" && event.type !== timelineType) return false;
        return true;
      });
      const eventsByYear = events.reduce((groups, event) => {
        groups[event.year] = groups[event.year] || [];
        groups[event.year].push(event);
        return groups;
      }, {});
      const groupedYears = Object.keys(eventsByYear).sort();
      const openMember = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("about");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      return (
        <main className="page-transition mx-auto max-w-6xl px-6 pb-10 pt-40 md:pt-44">
          <ToolHeader eyebrow="Fan Tools / Timeline" title="濃い推し年表" copy="活動史・楽曲史・メンバー史を同じ粒度で整理し、初期12人の始まりから今につながる導線を辿ります。" />
          <section className="filter-panel mb-10 grid gap-4 px-4 py-5 md:grid-cols-3">
            <label>
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">メンバー</span>
              <select value={timelineMember} onChange={(event) => setTimelineMember(event.target.value)} className="filter-control h-10 w-full text-sm font-bold">
                <option value="all">すべて</option>
                {MEMBERS.map((item) => <option key={item.id} value={item.id}>{item.name.replace(" ", "")}</option>)}
              </select>
            </label>
            <label>
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">年</span>
              <select value={timelineYear} onChange={(event) => setTimelineYear(event.target.value)} className="filter-control h-10 w-full text-sm font-bold">
                {years.map((year) => <option key={year} value={year}>{year === "all" ? "すべて" : year}</option>)}
              </select>
            </label>
            <label>
              <span className="mb-1 block text-[10px] font-bold tracking-[0.18em] text-[#c86b88]">種類</span>
              <select value={timelineType} onChange={(event) => setTimelineType(event.target.value)} className="filter-control h-10 w-full text-sm font-bold">
                {types.map((type) => <option key={type} value={type}>{type === "all" ? "すべて" : type}</option>)}
              </select>
            </label>
          </section>
          <section className="timeline-board space-y-12 pl-6 md:pl-10">
            {groupedYears.map((year) => (
              <div key={year} className="relative">
                <div className="timeline-year mb-5">
                  <span className="font-display text-3xl font-black italic leading-none text-[#f9769f]">{year}</span>
                  <span className="fluid-label font-bold tracking-[0.14em] text-[#8f6f7c]">{eventsByYear[year].length} EVENTS</span>
                </div>
                <div className="grid gap-4">
                  {eventsByYear[year].map((event, index) => {
                    const video = videoSourceByKey(event.videoKey);
                    return (
                      <article key={`${event.year}-${event.title}`} className="fan-tool-card page-card p-6 md:grid md:grid-cols-[9rem_1fr] md:gap-7 md:p-7" style={{ "--stagger": `${index * 35}ms` }}>
                        <div className="flex flex-wrap items-center gap-2 md:block">
                          <p className="status-pill fluid-label font-bold">{event.type}</p>
                          <p className="mt-0 fluid-label font-bold tracking-[0.14em] text-[#8f6f7c] md:mt-4">{event.dateLabel || event.year}</p>
                        </div>
                        <div className="mt-5 md:mt-0">
                          <h2 className="font-serif text-2xl font-bold text-[#2d2429]">{event.title}</h2>
                          <p className="readable-ja mt-3 fluid-caption font-normal leading-8 text-[#6f5b65]">{event.description}</p>
                          <div className="mt-4 flex flex-wrap gap-2">
                            {event.memberIds.slice(0, 8).map((memberId) => {
                              const item = MEMBER_BY_ID[memberId];
                              return <button key={memberId} onClick={() => openMember(memberId)} className="soft-chip fluid-label font-bold" style={{ color: item.hexColor }}>{item.name.replace(" ", "")}</button>;
                            })}
                            {event.memberIds.length > 8 && <span className="soft-chip fluid-label font-bold">+{event.memberIds.length - 8}</span>}
                          </div>
                          {video && (
                            <a href={video.url} target="_blank" rel="noreferrer" className="mt-5 inline-flex items-center gap-2 rounded-full bg-[#2d2429] px-4 py-2 fluid-label font-bold tracking-[0.12em] text-white transition hover:-translate-y-0.5 hover:bg-[#f9769f]">
                              <Icon name="play" className="h-3.5 w-3.5" />
                              関連動画を見る
                            </a>
                          )}
                        </div>
                      </article>
                    );
                  })}
                </div>
              </div>
            ))}
          </section>
        </main>
      );
    }

    const FIRST_GUIDE_NOTES = {
      emiri: {
        intro: "まず見てほしいのは、可愛いをちゃんと努力で作っているところ。表情、衣装の見せ方、画面に残る余韻まで、全部に美意識がある。",
        points: ["表情の細かさを見ると一気に楽しい。", "甘い曲でも芯の強さが残る。", "SNSや個人YouTubeまで見ると人柄が近くなる。"]
      },
      hana: {
        intro: "明るいだけじゃなくて、場面の空気を読んで表情を置ける人。花菜ちゃんが映ると、曲の中に小さな物語が増える。",
        points: ["笑顔の明るさから入ると見やすい。", "演じる曲では目線と手先に注目。", "イラストや舞台好きの感性も魅力につながる。"]
      },
      risa: {
        intro: "莉沙ちゃんは、派手に押してくるというより、あとからじわっと残るタイプ。しなやかな動きとやわらかい目線がきれい。",
        points: ["ダンスの流れがなめらか。", "笑顔が出る瞬間の温度がいい。", "福岡愛やファンへの距離感も入口になる。"]
      },
      kiara: {
        intro: "樹愛羅ちゃんは、成長を見ている時間ごと好きになる人。可愛いの瞬発力と、負けず嫌いな芯が同時に見える。",
        points: ["まずは明るい曲で表情を見る。", "昔の映像と今を比べると伸び方が分かる。", "ゲームやメイク好きの親しみやすさも強い。"]
      },
      nagisa: {
        intro: "なーたんは、王道アイドルの眩しさをまっすぐ届ける人。可愛いの密度が高くて、短いカットでも記憶に残る。",
        points: ["目線と声の甘さが入口。", "王道曲でのヒロイン感が強い。", "初期の可愛さの系譜を知るうえで大事な存在。"]
      },
      maika: {
        intro: "舞香ちゃんは、歌が入った瞬間に景色を変える人。静かな雰囲気から急に物語が立ち上がる、その落差が気持ちいい。",
        points: ["まず声を聴くと掴みやすい。", "切ない曲では表情が深い。", "あんまい導線で素の空気も見られる。"]
      },
      nonno: {
        intro: "のんのちゃんは、初期の空気を知るうえで外せない人。アイドルが好きな気持ちを、ステージの明るさに変えていた。",
        points: ["初期曲と一緒に見ると存在感が分かる。", "笑顔のまっすぐさが入口。", "12人の始まりを辿る時に大切なピース。"]
      },
      hitomi: {
        intro: "瞳ちゃんは、真ん中に立った時の説得力がすごい。笑顔で空気を開いて、曲全体を明るい方向へ連れていく。",
        points: ["センター曲から入ると分かりやすい。", "ライブでは体の軸と表情を見る。", "王道の明るさと戻ってきた強さがある。"]
      },
      shoko: {
        intro: "笙古ちゃんは、丁寧に積み重ねてきたものが見える人。派手な一撃より、何度も見返したくなる誠実さが残る。",
        points: ["歌と立ち姿の丁寧さを見る。", "ライブ映像でじわっと効いてくる。", "料理や横浜好きの暮らし感も親しみやすい。"]
      },
      iori: {
        intro: "衣織ちゃんは、表情だけで曲の奥へ連れていく人。可愛い、かっこいい、怖い、切ないを一瞬で切り替える。",
        points: ["目線の強さから入ると早い。", "歌声の色が曲ごとに変わる。", "アニメや物語好きの感性が表現に出ている。"]
      },
      sana: {
        intro: "沙夏ちゃんは、声が入ると曲が大人っぽくなる人。余裕のある表情と、ふっと熱くなる歌がクセになる。",
        points: ["まず歌声の艶を聴く。", "ユニット曲での空気作りが上手い。", "ダンス由来のしなやかさも見どころ。"]
      },
      anna: {
        intro: "杏奈ちゃんは、グループを見て支える力がそのまま魅力になっている人。小さな体から出るダンスの説得力も強い。",
        points: ["リーダーとしての安心感を見る。", "ダンスは細かいリズムまで楽しい。", "あんまいでは素のやわらかさも見える。"]
      }
    };

    function FirstTimeView({ setMember, setPage, setView, resetFilters }) {
      const openArchive = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("works");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };
      const openProfile = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("about");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      return (
        <main className="page-transition mx-auto max-w-7xl px-6 pb-10 pt-40 md:pt-44">
          <ToolHeader eyebrow="Fan Tools / First Guide" title="親子・初見ガイド" copy="まず何を知れば好きになりやすいかを、12人それぞれ30秒で読める入門カードに整理しました。" />
          <section className="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
            {MEMBERS.map((item, index) => {
              const picks = (FIRST_TIME_PICKS[item.id] || []).map((key) => firstMemberVideo(item.id, key)).filter(Boolean);
              const firstPick = picks[0];
              const nextPicks = picks.slice(1, 3);
              const guide = FIRST_GUIDE_NOTES[item.id];
              const guidePoints = guide?.points || [item.catchcopy, `${item.place}出身。まずは表情と声の温度を見る。`, `${item.notes.join(" / ")} を入口にすると魅力が掴みやすい。`];
              return (
                <article key={item.id} className="fan-tool-card page-card p-6" style={{ "--stagger": `${index * 35}ms` }}>
                  <div className="flex items-start justify-between gap-4">
                    <div className="min-w-0">
                      <h2 className="font-serif text-3xl font-bold text-[#2d2429]">{item.name.replace(" ", "")}</h2>
                      <p className="mt-1 fluid-label font-bold tracking-[0.12em] text-[#8f6f7c]">{item.en}</p>
                    </div>
                    <span className="h-3 w-14 rounded-full" style={{ background: memberAccent(item) }}></span>
                  </div>
                  <div className="mt-5 rounded-[10px] border border-[#f8d7e2] bg-white/70 p-4">
                    <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">30秒紹介</p>
                    <p className="readable-ja mt-2 fluid-caption font-normal leading-7 text-[#6f5b65]">{guide?.intro || `${item.profile.split("。").slice(0, 2).join("。")}。`}</p>
                  </div>
                  <div className="mt-5">
                    <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">まず知る3ポイント</p>
                    <ol className="mt-3 grid gap-2">
                      {guidePoints.map((point, pointIndex) => (
                        <li key={point} className="flex gap-3 rounded-[8px] bg-white/70 px-3 py-2 text-sm font-bold leading-6 text-[#6f5b65]">
                          <span className="shrink-0 text-[#c86b88]">{pointIndex + 1}</span>
                          <span className="readable-ja">{point}</span>
                        </li>
                      ))}
                    </ol>
                  </div>
                  {firstPick && (
                    <a href={firstPick.url} target="_blank" rel="noreferrer" className="mt-5 block rounded-[10px] border-2 bg-white px-4 py-4 text-sm font-bold text-[#2d2429] transition hover:-translate-y-0.5 hover:bg-white" style={{ borderColor: item.hexColor }}>
                      <span className="fluid-label font-bold tracking-[0.16em]" style={{ color: item.hexColor }}>この子を知る最初の1本</span>
                      <BreakableTitle title={firstPick.title} className="mt-2 block font-serif text-xl font-bold leading-snug" />
                      <span className="mt-1 block text-[10px] tracking-[0.12em] text-[#8f6f7c]">{firstPick.type} / {firstPick.watchPoint}</span>
                    </a>
                  )}
                  <div className="mt-4 grid gap-2">
                    <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">場面を変えて見る2本</p>
                    {nextPicks.map((video) => (
                      <a key={video.id} href={video.url} target="_blank" rel="noreferrer" className="rounded-[8px] border border-[#f8d7e2] bg-white/72 px-4 py-3 text-sm font-bold text-[#2d2429] transition hover:bg-white">
                        <BreakableTitle title={video.title} className="block leading-snug" />
                        <span className="mt-1 block text-[10px] tracking-[0.12em] text-[#c86b88]">{video.type} / {video.watchPoint}</span>
                      </a>
                    ))}
                  </div>
                  <div className="mt-5 flex flex-wrap gap-2">
                    <button onClick={() => openProfile(item.id)} className="rounded-full bg-white px-4 py-2 fluid-label font-bold tracking-[0.12em] text-[#2d2429] shadow-[0_8px_20px_rgba(249,118,159,0.10)] transition hover:-translate-y-0.5">Profile</button>
                    <button onClick={() => openArchive(item.id)} className={`rounded-full border-2 px-4 py-2 fluid-label font-bold tracking-[0.12em] transition hover:-translate-y-0.5 ${isMonoMember(item) ? "mono-action-primary" : ""}`} style={memberActionStyle(item)} data-member-action={item.id}>Archiveで深掘り</button>
                  </div>
                </article>
              );
            })}
          </section>
        </main>
      );
    }

    function BadgesView({ watchedIds, member, setMember, setPage, setView, resetFilters }) {
      const currentBadges = badgeStates(watchedIds, member);
      const unlockedCount = currentBadges.filter((badge) => badge.unlocked).length;
      const topMembers = MEMBERS
        .map((item) => ({ ...item, progress: memberProgress(item.id, watchedIds) }))
        .sort((a, b) => b.progress.watched - a.progress.watched)
        .slice(0, 4);

      const openArchive = (id) => {
        runUiTransition(() => {
          setMember(id);
          setPage("works");
          setView("member");
          resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      return (
        <main className="page-transition mx-auto max-w-7xl px-6 pb-10 pt-40 md:pt-44">
          <ToolHeader eyebrow="Fan Tools / Badges" title="沼落ち称号" copy="視聴メモから今の到達度を計算します。追加保存はせず、この端末のチェック状況だけで称号が変わります。" />
          <section className="mb-8 grid gap-5 lg:grid-cols-[0.82fr_1.18fr]">
            <div className="enterprise-section p-7">
              <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">Achievement</p>
              <p className="mt-4 font-display text-7xl font-black italic leading-none text-[#f9769f]">{unlockedCount}/{currentBadges.length}</p>
              <p className="readable-ja mt-4 fluid-caption font-bold leading-7 text-[#6f5b65]">称号は選択中メンバーの進捗も反映します。推し15本、推し60本はArchiveでチェックを進めると開きます。</p>
            </div>
            <div className="enterprise-section p-7">
              <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">Progress Focus</p>
              <div className="mt-5 grid gap-3 sm:grid-cols-2">
                {topMembers.map((item) => (
                  <button key={item.id} onClick={() => openArchive(item.id)} className="rounded-[12px] border border-[#f8d7e2] bg-white/78 p-4 text-left transition hover:-translate-y-1 hover:bg-white">
                    <span className="flex items-center justify-between gap-3">
                      <span className="font-serif text-xl font-bold text-[#2d2429]">{item.name.replace(" ", "")}</span>
                      <span className="fluid-label font-bold text-[#8f6f7c]">{item.progress.watched}/{item.progress.total}</span>
                    </span>
                    <span className="mt-3 block h-1.5 overflow-hidden rounded-full bg-[#f8d7e2]">
                      <span className="block h-full rounded-full" style={{ width: `${item.progress.percent}%`, background: memberAccent(item) }}></span>
                    </span>
                  </button>
                ))}
              </div>
            </div>
          </section>
          <section className="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
            {currentBadges.map((badge, index) => (
              <div key={badge.id} className={`badge-card page-card p-5 ${badge.unlocked ? "" : "is-locked"}`} style={{ "--stagger": `${index * 35}ms` }}>
                <p className="fluid-label font-bold tracking-[0.14em]" style={{ color: badge.unlocked ? "#c86b88" : "#9ca3af" }}>{badge.unlocked ? "UNLOCKED" : "LOCKED"}</p>
                <p className="mt-2 font-serif text-xl font-bold text-[#2d2429]">{badge.label}</p>
                <p className="mt-2 text-xs font-bold leading-6 text-[#8f6f7c]">{badge.condition}</p>
              </div>
            ))}
          </section>
        </main>
      );
    }

    function LegacyFooter({ setView }) {
      return (
        <footer className="relative mt-24 overflow-hidden border-t border-[#f6dce5] px-8 py-24 text-center md:py-32" style={{ background: "linear-gradient(180deg, #fffafb 0%, #ffeef5 100%)" }}>
          <div className="relative z-10 space-y-8">
            <p className="mx-auto max-w-2xl fluid-caption font-normal leading-7 tracking-[0.06em] text-[#6f5b65]">
              =LOVEを好きになった瞬間を、少しずつ集めていける非公式ファンページです。
            </p>
            <div className="mx-auto grid max-w-3xl gap-3 md:grid-cols-2">
              <a href="https://twitter.com/eyes_takamatsu" target="_blank" rel="noreferrer" className="section-card p-5 text-left transition hover:-translate-y-1">
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">総合管理者</p>
                <p className="mt-2 font-serif text-2xl font-bold text-[#2d2429]">あお</p>
                <p className="mt-2 fluid-label font-bold text-[#8f6f7c]">X: @eyes_takamatsu</p>
              </a>
              <a href="https://twitter.com/iohana_momiji" target="_blank" rel="noreferrer" className="section-card p-5 text-left transition hover:-translate-y-1">
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">技術協力</p>
                <p className="mt-2 font-serif text-2xl font-bold text-[#2d2429]">いろは紅葉</p>
                <p className="mt-2 fluid-label font-bold text-[#8f6f7c]">X: @iohana_momiji</p>
              </a>
            </div>
            <button onClick={() => { runUiTransition(() => setView("privacy")); window.scrollTo({ top: 0, behavior: "smooth" }); }} className="border-b border-[#f9769f] pb-1 fluid-label font-bold tracking-[0.18em] text-[#8f6f7c] transition hover:text-[#2d2429]">
              プライバシーポリシー
            </button>
          </div>
        </footer>
      );
    }

    function App() {
      const [view, setView] = useState("home");
      const [page, setPage] = useState("works");
      const [member, setMember] = useState("iori");
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedType, setSelectedType] = useState("すべて");
      const [selectedTag, setSelectedTag] = useState("すべて");
      const [showWatchedOnly, setShowWatchedOnly] = useState(false);
      const [watchedIds, setWatchedIds] = useState(loadWatchedIds);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(watchedIds));
      }, [watchedIds]);

      const current = MEMBER_BY_ID[member];
      const memberVideos = useMemo(() => VIDEO_DATA.filter((video) => video.memberId === member), [member]);
      const progress = memberProgress(member, watchedIds);
      const badges = useMemo(() => badgeStates(watchedIds, member), [watchedIds, member]);

      const filteredVideos = useMemo(() => {
        const normalized = searchQuery.trim().toLowerCase();
        return memberVideos.filter((video) => {
          const text = `${video.title} ${video.comment} ${video.type} ${video.tags.join(" ")} ${current.name} ${current.en}`.toLowerCase();
          if (selectedType !== "すべて" && video.type !== selectedType) return false;
          if (selectedTag !== "すべて" && !video.tags.includes(selectedTag)) return false;
          if (showWatchedOnly && !watchedIds.includes(video.id)) return false;
          if (normalized && !text.includes(normalized)) return false;
          return true;
        });
      }, [searchQuery, selectedType, selectedTag, showWatchedOnly, watchedIds, memberVideos, current]);

      const toggleWatched = (id) => {
        setWatchedIds((current) => current.includes(id) ? current.filter((item) => item !== id) : [...current, id]);
      };

      const resetFilters = () => {
        setSearchQuery("");
        setSelectedType("すべて");
        setSelectedTag("すべて");
        setShowWatchedOnly(false);
      };

      return (
        <div className="app-shell dual-bg selection:bg-deep selection:text-white">
          <LegacyTopNav
            member={member}
            setMember={setMember}
            page={page}
            setPage={setPage}
            view={view}
            setView={setView}
            resetFilters={resetFilters}
          />
          {view === "member" && <LegacyProgress current={current} progress={progress} page={page} />}

          {view === "home" && (
            <HomeMemberIndex setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} watchedIds={watchedIds} />
          )}

          {view === "privacy" && (
            <PrivacyPolicy setView={setView} />
          )}

          {view === "relations" && (
            <RelationsView member={member} setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} />
          )}

          {view === "timeline" && (
            <TimelineView setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} />
          )}

          {view === "firsttime" && (
            <FirstTimeView setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} />
          )}

          {view === "badges" && (
            <BadgesView watchedIds={watchedIds} member={member} setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} />
          )}

          {view === "member" && (
          <main className="page-transition mx-auto max-w-7xl px-6 pb-8 pt-40 md:pt-44">
            {page === "works" && (
              <div key={`${member}-works`} className="animate-in">
                <MemberHero current={current} progress={progress} memberVideos={memberVideos} badges={badges} />
                <BadgePanel badges={badges} />
                <LegacyFilterBar
                  searchQuery={searchQuery}
                  setSearchQuery={setSearchQuery}
                  selectedType={selectedType}
                  setSelectedType={setSelectedType}
                  selectedTag={selectedTag}
                  setSelectedTag={setSelectedTag}
                  showWatchedOnly={showWatchedOnly}
                  setShowWatchedOnly={setShowWatchedOnly}
                  resetFilters={resetFilters}
                  filteredCount={filteredVideos.length}
                />
                <LegacyVideoGrid videos={filteredVideos} current={current} watchedIds={watchedIds} toggleWatched={toggleWatched} />
                <SourceNote />
              </div>
            )}

            {page === "about" && (
              <div key={`${member}-about`} className="animate-in">
                <LegacyProfile current={current} videos={memberVideos} />
                <SourceNote />
              </div>
            )}
          </main>
          )}
          <LegacyFooter setView={setView} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
