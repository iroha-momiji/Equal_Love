    function FitTitle({ text, className = "", max = 128, min = 28, as: Tag = "span", style = {} }) {
      const ref = useRef(null);
      const [measuredSize, setMeasuredSize] = useState(null);
      const vw = Math.max(4.2, Math.min(11, 132 / Math.max(text.length, 1)));

      useLayoutEffect(() => {
        const element = ref.current;
        if (!element) return;

        const fit = () => {
          const parentWidth = element.parentElement?.clientWidth || element.clientWidth;
          if (!parentWidth) return;

          const computed = window.getComputedStyle(element);
          const probe = document.createElement("span");
          probe.textContent = text;
          probe.style.position = "absolute";
          probe.style.visibility = "hidden";
          probe.style.whiteSpace = "nowrap";
          probe.style.fontFamily = computed.fontFamily;
          probe.style.fontWeight = computed.fontWeight;
          probe.style.fontStyle = computed.fontStyle;
          probe.style.letterSpacing = computed.letterSpacing;
          probe.style.fontSize = `${max}px`;
          document.body.appendChild(probe);

          const width = probe.scrollWidth || 1;
          probe.remove();

          const nextSize = Math.max(min, Math.min(max, Math.floor(max * (parentWidth - 2) / width)));
          setMeasuredSize((current) => current === nextSize ? current : nextSize);
        };

        fit();
        const observer = new ResizeObserver(fit);
        observer.observe(element.parentElement || element);
        window.addEventListener("resize", fit);
        return () => {
          observer.disconnect();
          window.removeEventListener("resize", fit);
        };
      }, [text, max, min, className]);

      return (
        <Tag
          ref={ref}
          className={`fit-title ${className}`}
          style={{
            ...style,
            "--fit-fallback": `clamp(${min}px, ${vw}vw, ${max}px)`,
            fontSize: measuredSize ? `${measuredSize}px` : style.fontSize
          }}
          title={text}
        >
          {text}
        </Tag>
      );
    }

          <div className="soft-card overflow-hidden p-5 md:p-8">

              <Icon name="heart" className="h-3.5 w-3.5 text-primary" />
              10人ぶんの入口、ここに集めました
            </div>
            <h1 className="font-rounded text-3xl font-extrabold leading-tight text-purple-950 md:text-5xl">

                <Icon name="users" className="h-4 w-4" />

              </button>

          <div className="grid gap-3 sm:grid-cols-2 md:grid-cols-1">

                <a key={id} href={video.url} target="_blank" rel="noreferrer" className="soft-card group grid grid-cols-[116px_1fr] gap-3 overflow-hidden p-3 transition hover:-translate-y-0.5 hover:shadow-xl">

    function MemberRail({ selectedMember, setSelectedMember, watchedIds }) {
      return (
        <section className="mt-6">

            <div>
              <h2 className="font-rounded text-xl font-extrabold text-purple-950">メンバーから探す</h2>
              <p className="text-xs font-bold text-gray-500">各メンバー15本、合計150本</p>
            </div>
            <button
              onClick={() => setSelectedMember("all")}
              className={`rounded-full px-3 py-1.5 text-xs font-black transition ${selectedMember === "all" ? "bg-primary text-white" : "bg-white text-gray-500 ring-1 ring-purple-100"}`}
            >
              全員
            </button>
          </div>
          <div className="scrollbar-hide flex gap-3 overflow-x-auto pb-2">
            {MEMBERS.map((member) => {
              const progress = memberProgress(member.id, watchedIds);
              const active = selectedMember === member.id;
              return (
                <button
                  key={member.id}
                  onClick={() => setSelectedMember(member.id)}
                  className={`soft-card min-w-[172px] p-3 text-left transition ${active ? "ring-2 ring-purple-300" : "hover:-translate-y-0.5"}`}

                    <span className="member-dot h-10 w-10 rounded-full" style={{ background: member.hexColor }}></span>
                    <span className="min-w-0">
                      <span className="block truncate text-sm font-black text-purple-950">{member.name}</span>
                      <span className="block text-[10px] font-black uppercase tracking-wide text-gray-400">{member.short}</span>
                    </span>
                  </div>
                  <div className="mt-3 h-1.5 overflow-hidden rounded-full bg-white">
                    <div className="h-full rounded-full transition-all duration-500" style={{ width: `${progress.percent}%`, background: member.hexColor }}></div>
                  </div>
                  <p className="mt-1 text-right text-[10px] font-black text-gray-500">{progress.watched}/{progress.total}</p>

    function FilterBar({ searchQuery, setSearchQuery, selectedType, setSelectedType, selectedTag, setSelectedTag, showWatchedOnly, setShowWatchedOnly, resetFilters, filteredCount }) {
      return (
        <section className="soft-card mt-6 p-3 md:p-4">
          <div className="grid gap-3 md:grid-cols-[1fr_auto_auto] md:items-center">
            <label className="relative block">
              <Icon name="search" className="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" />
              <input
                value={searchQuery}
                onChange={(event) => setSearchQuery(event.target.value)}
                placeholder="動画タイトル・説明・タグで検索..."
                className="h-11 w-full rounded-full border border-purple-100 bg-white pl-10 pr-4 text-sm font-bold outline-none transition focus:border-primary focus:ring-2 focus:ring-purple-100"
              />
            </label>

            <button
              onClick={() => setShowWatchedOnly((value) => !value)}
              className={`inline-flex h-11 items-center justify-center gap-2 rounded-full px-4 text-sm font-black transition ${showWatchedOnly ? "bg-primary text-white" : "bg-purple-50 text-purple-950"}`}
            >
              <Icon name="check" className="h-4 w-4" />

            </button>

            <button onClick={resetFilters} className="inline-flex h-11 items-center justify-center gap-2 rounded-full bg-white px-4 text-sm font-black text-gray-500 ring-1 ring-purple-100 transition hover:bg-purple-50">
              <Icon name="reset" className="h-4 w-4" />

          <div className="mt-3 flex flex-wrap gap-2">
            {TYPES.map((type) => (
              <button
                key={type}

                {type}
              </button>
            ))}

          <div className="mt-2 flex flex-wrap items-center gap-2">
            <span className="inline-flex items-center gap-1 rounded-full bg-purple-50 px-3 py-2 text-xs font-black text-purple-900">
              <Icon name="filter" className="h-3.5 w-3.5" />

            </span>
            {TAGS.map((tag) => (
              <button
                key={tag}
                onClick={() => setSelectedTag(tag)}
                className={`rounded-full px-3 py-2 text-xs font-black transition ${selectedTag === tag ? "bg-primary text-white" : "bg-white text-gray-500 ring-1 ring-purple-100 hover:bg-purple-50"}`}
              >
                #{tag}
              </button>
            ))}
          </div>
        </section>
      );

    function VideoCard({ video, watched, toggleWatched }) {
      const member = MEMBER_BY_ID[video.memberId];
      return (
        <article className="soft-card group overflow-hidden transition hover:-translate-y-0.5 hover:shadow-xl">
          <Thumbnail video={video} />
          <div className="p-4">
            <div className="mb-2 flex items-center justify-between gap-3">
              <div className="flex min-w-0 items-center gap-2">
                <span className="member-dot h-5 w-5 rounded-full" style={{ background: member.hexColor }}></span>
                <span className="truncate text-[11px] font-black" style={{ color: member.hexColor }}>{member.name}</span>
              </div>
              <button
                onClick={() => toggleWatched(video.id)}
                className={`grid h-8 w-8 flex-none place-items-center rounded-full transition ${watched ? "text-white" : "bg-purple-50 text-gray-400 hover:text-primary"}`}
                style={{ background: watched ? member.hexColor : undefined }}
                aria-label={watched ? "視聴済みを解除" : "視聴済みにする"}
                title={watched ? "視聴済みを解除" : "視聴済みにする"}
              >
                <Icon name="check" className="h-4 w-4" />
              </button>
            </div>
            <h3 className="line-clamp-2 min-h-[2.75rem] text-base font-black leading-snug text-purple-950">{video.title}</h3>
            <p className="mt-2 line-clamp-3 min-h-[4.5rem] text-sm font-medium leading-6 text-gray-600">{video.comment}</p>
            <div className="mt-3 flex flex-wrap gap-1.5">
              {video.tags.slice(0, 3).map((tag) => (
                <span key={tag} className="rounded-full bg-purple-50 px-2.5 py-1 text-[10px] font-black text-purple-800">#{tag}</span>
              ))}
            </div>
            <div className="mt-4 flex items-center justify-between gap-3 border-t border-purple-100 pt-3">
              <span className="text-[10px] font-black text-gray-400">{video.sourceLabel}</span>
              <a href={video.url} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 rounded-full bg-ink px-3 py-2 text-[11px] font-black text-white transition hover:bg-primary">
                観る
                <Icon name="external" className="h-3.5 w-3.5" />

    function VideoGrid({ videos, watchedIds, toggleWatched }) {
      if (videos.length === 0) {
        return (
          <div className="soft-card mt-6 p-10 text-center">
            <p className="font-rounded text-xl font-extrabold text-purple-950">この条件の動画はまだ見つかりません</p>
            <p className="mt-2 text-sm font-bold text-gray-500">検索語やタグを少しゆるめると、入口が見つかるかもしれません。</p>
          </div>
        );
      }

      return (
        <section className="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
          {videos.map((video) => (
            <VideoCard key={video.id} video={video} watched={watchedIds.includes(video.id)} toggleWatched={toggleWatched} />
          ))}
        </section>
      );
    }

    function ProfilePanel({ selectedMember, setSelectedMember, watchedIds }) {
      const members = selectedMember === "all" ? MEMBERS : [MEMBER_BY_ID[selectedMember]];
      return (
        <section className="mt-6 grid gap-4 lg:grid-cols-2">
          {members.map((member) => {
            const progress = memberProgress(member.id, watchedIds);

            return (
              <article key={member.id} className="soft-card overflow-hidden">
                <div className="p-5" style={{ background: `linear-gradient(135deg, ${member.softColor}, rgba(255,255,255,0.82))` }}>
                  <div className="flex items-start justify-between gap-4">
                    <button onClick={() => setSelectedMember(member.id)} className="flex min-w-0 items-center gap-3 text-left">
                      <span className="member-dot h-14 w-14 flex-none rounded-full" style={{ background: member.hexColor }}></span>
                      <span className="min-w-0">
                        <span className="block text-xl font-black text-purple-950">{member.name}</span>
                        <span className="block text-xs font-black uppercase tracking-wide text-gray-500">{member.en}</span>
                      </span>
                    </button>
                    <span className="rounded-full bg-white px-3 py-1.5 text-xs font-black text-gray-500">{progress.percent}%</span>

                      <dt className="text-[10px] uppercase tracking-wide text-gray-400">Birthday</dt>
                      <dd className="mt-1 text-purple-950">{member.birth}</dd>
                    </div>
                    <div className="rounded-md bg-white/80 px-3 py-2">
                      <dt className="text-[10px] uppercase tracking-wide text-gray-400">Birthplace</dt>
                      <dd className="mt-1 text-purple-950">{member.place}</dd>
                    </div>
                  </dl>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {member.notes.map((note) => (
                      <span key={note} className="rounded-full bg-white px-3 py-1.5 text-xs font-black text-gray-500">#{note}</span>
                    ))}
                  </div>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {member.socials.map((social) => (
                      <a key={social.label} href={social.url} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 rounded-full bg-ink px-3 py-2 text-xs font-black text-white transition hover:bg-primary">
                        {social.label}
                        <Icon name="external" className="h-3.5 w-3.5" />
                      </a>
                    ))}
                  </div>
                </div>
                <div className="divide-y divide-purple-100/70">
                  {picks.map((video) => (
                    <a key={video.id} href={video.url} target="_blank" rel="noreferrer" className="flex items-center gap-3 p-4 transition hover:bg-purple-50/60">
                      <span className="grid h-8 w-8 flex-none place-items-center rounded-full text-xs font-black text-white" style={{ background: member.hexColor }}>{video.id.split("-").pop()}</span>
                      <span className="min-w-0 flex-1">
                        <span className="block truncate text-sm font-black text-purple-950">{video.title}</span>
                        <span className="block truncate text-xs font-bold text-gray-500">{video.type} / {video.tags.join("、")}</span>
                      </span>
                      <Icon name="external" className="h-4 w-4 flex-none text-gray-300" />

                  ))}
                </div>
              </article>
            );
          })}

          setPage("works");
          setView("member");
          resetFilters();

        window.scrollTo({ top: 0, behavior: "smooth" });

              <div>
                <p className="fluid-label font-bold tracking-[0.18em] text-[#c86b88]">=LOVE OFFICIAL LINKS</p>

              <div className="flex flex-wrap gap-2">

                    <span className="mt-6 block h-1.5 overflow-hidden rounded-full bg-[#f8d7e2]">
                      <span className="block h-full rounded-full transition-all duration-700" style={{ width: `${progress.percent}%`, background: memberGradient(item) }}></span>
                    </span>
                  </button>
                );
              })}
            </div>
          </section>
        </main>
      );

            <button onClick={() => { runUiTransition(() => setView("home")); window.scrollTo({ top: 0, behavior: "smooth" }); }} className="mt-12 border-b-2 border-zinc-900 pb-1 text-[11px] font-black uppercase tracking-[0.28em] text-zinc-900 transition-opacity hover:opacity-50">

            </button>
          </section>

    function LegacyTopNav({ member, setMember, page, setPage, view, setView, resetFilters }) {
      const current = MEMBER_BY_ID[member];
      const chooseMember = (id) => {
        runUiTransition(() => {
          setMember(id);
          setView("member");
          if (page === "works") resetFilters();
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };
      return (
        <nav className="glass-nav fixed top-0 z-[1000] flex w-full items-center justify-between gap-6 px-5 py-5 md:px-8">
          <div className="scrollbar-hide flex min-w-0 items-center gap-7 overflow-x-auto">
            {MEMBERS.map((item) => {
              const active = member === item.id;
              return (
                <button
                  key={item.id}
                  onClick={() => chooseMember(item.id)}
                  className={`shrink-0 font-display text-2xl font-black italic tracking-tight transition-all ${active ? "scale-110" : "opacity-35 hover:opacity-65"}`}
                  style={{ color: active ? item.hexColor : undefined }}
                  title={item.name}
                >
                  {item.short.toUpperCase()}.
                </button>
              );
            })}
          </div>
          <div className="flex shrink-0 gap-4 text-[11px] font-black uppercase tracking-[0.24em] text-[#2d2429] md:gap-8 md:tracking-[0.28em]">
            <button onClick={() => { runUiTransition(() => setView("home")); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={view === "home" ? "" : "opacity-30 hover:opacity-60"} style={{ color: view === "home" ? "#f9769f" : undefined }}>Top</button>
            <button onClick={() => { runUiTransition(() => { setView("member"); setPage("about"); }); window.scrollTo({ top: 0, behavior: "smooth" }); }} style={{ color: view === "member" && page === "about" ? current.hexColor : undefined }} className={view === "member" && page === "about" ? "" : "opacity-30 hover:opacity-60"}>Profile</button>
            <button onClick={() => { runUiTransition(() => { setView("member"); setPage("works"); }); window.scrollTo({ top: 0, behavior: "smooth" }); }} style={{ color: view === "member" && page === "works" ? current.hexColor : undefined }} className={view === "member" && page === "works" ? "" : "opacity-30 hover:opacity-60"}>Archive</button>
            <button onClick={() => { runUiTransition(() => setView("privacy")); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={view === "privacy" ? "" : "opacity-30 hover:opacity-60"} style={{ color: view === "privacy" ? "#f9769f" : undefined }}>Policy</button>
          </div>
        </nav>
      );

    function LegacyProgress({ current, progress, page }) {

            <div className="mb-2 text-[10px] font-bold tracking-[0.18em]" style={{ color: current.hexColor }}>{current.name} 視聴メモ</div>
            <div className="h-1.5 w-52 overflow-hidden rounded-full bg-zinc-100">
              <div className="h-full transition-all duration-1000" style={{ width: `${progress.percent}%`, background: memberGradient(current) }}></div>
            </div>
            <div className="mt-2 text-right text-sm font-bold text-[#2d2429]">{progress.percent}% 視聴済み</div>
          </div>

          <div className="min-w-0">

            <p className="mt-3 fluid-caption font-bold text-[#8f6f7c]">{current.en}</p>

    function LegacyFilterBar({ searchQuery, setSearchQuery, selectedType, setSelectedType, selectedTag, setSelectedTag, showWatchedOnly, setShowWatchedOnly, resetFilters, filteredCount }) {

        <section className="filter-panel relative z-10 mb-16 px-4 py-5 md:px-6">

    function LegacyVideoGrid({ videos, current, watchedIds, toggleWatched }) {
      if (videos.length === 0) {
        return (
          <div className="mx-auto max-w-3xl rounded-[8px] border border-[#f8d7e2] bg-white p-12 text-center shadow-[0_18px_45px_rgba(249,118,159,0.10)]">

            <p className="mt-3 text-sm font-normal leading-7 text-zinc-500">検索語や絞り込みを少しゆるめて、もう一度探してみてください。</p>
          </div>

      return (
        <div className="grid grid-cols-1 gap-x-14 gap-y-28 md:grid-cols-2 lg:grid-cols-3">

            const watched = watchedIds.includes(video.id);

                    <span className="play-badge" style={{ background: current.id === "maika" ? "#2d2429" : memberGradient(current, 135) }}>

                  {watched && (
                    <div className="absolute right-3 top-3 rounded-full bg-white/92 px-3 py-1 text-[10px] font-bold tracking-[0.12em] shadow-[0_10px_26px_rgba(45,36,41,0.12)]" style={{ color: current.hexColor }}>
                      視聴済み
                    </div>
                  )}
                  <button
                    onClick={() => toggleWatched(video.id)}
                    className={`absolute -bottom-5 -right-5 flex h-14 w-14 items-center justify-center rounded-full text-xl shadow-2xl ring-8 ring-white transition-all hover:scale-105 ${watched ? "text-white" : "bg-white text-zinc-300"}`}
                    style={{ background: watched ? (current.id === "maika" ? "#2d2429" : memberGradient(current, 135)) : undefined }}
                    title={watched ? "視聴済みを解除" : "視聴済みにする"}
                    aria-label={watched ? "視聴済みを解除" : "視聴済みにする"}
                  >
                    {watched ? "✓" : "＋"}
                  </button>

                <div className="space-y-5">
                  <div className="flex items-center justify-between gap-3 fluid-label font-bold tracking-[0.12em] text-[#c86b88]">
                    <span>{video.watchPoint}</span>
                    <span className="text-zinc-300">{video.date}</span>
                  </div>
                  <h3 className="font-serif text-2xl font-bold leading-snug text-[#2d2429] transition-colors md:text-3xl group-hover:text-[#c86b88]">{video.title}</h3>
                  <p className="line-clamp-3 text-[15px] font-normal leading-[2.1] text-zinc-500">{video.comment}</p>
                  <div className="flex flex-wrap gap-2 fluid-label font-bold tracking-[0.08em]">
                    {video.tags.slice(0, 3).map((tag) => <span key={tag} className="soft-chip">#{tag}</span>)}
                  </div>
                  <a href={video.url} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full px-4 py-2 fluid-label font-bold tracking-[0.14em] text-white shadow-[0_12px_28px_rgba(45,36,41,0.12)] transition hover:-translate-y-0.5 hover:opacity-90" style={{ background: current.id === "maika" ? "#2d2429" : memberGradient(current, 135), color: "#fff" }}>
                    <Icon name="play" className="h-3.5 w-3.5" />
                    YouTubeで観る
                  </a>
                </div>
              </article>
            );
          })}
        </div>
      );
    }

                <div className="flex justify-between gap-4 border-b border-zinc-100 pb-4"><dt className="font-bold tracking-[0.12em] text-gold">おすすめ</dt><dd className="text-right font-bold">{videos.length}本</dd></div>

              <p className="readable-ja fluid-copy font-normal leading-[2.25] text-zinc-600">{current.profile}</p>
              <div className="mt-10 grid gap-3 border-t border-zinc-100 pt-8">

                {videos.slice(0, 3).map((video) => (
                  <a key={video.id} href={video.url} target="_blank" rel="noreferrer" className="flex items-center justify-between gap-4 border-b border-zinc-50 pb-3 text-sm transition-opacity hover:opacity-60">
                    <span className="min-w-0 truncate font-bold text-[#2d2429]">{video.title}</span>

    function LegacyFooter({ setView }) {
      return (
        <footer className="relative mt-24 overflow-hidden border-t border-[#f6dce5] px-8 py-24 text-center md:py-32" style={{ background: "linear-gradient(180deg, #fffafb 0%, #ffeef5 100%)" }}>
          <div className="relative z-10 space-y-8">
            <p className="mx-auto max-w-2xl fluid-caption font-normal leading-7 tracking-[0.06em] text-[#6f5b65]">
              =LOVEを好きになった瞬間を、少しずつ集めていける非公式ファンページです。
            </p>
            <div className="mx-auto grid max-w-3xl gap-3 md:grid-cols-2">
              <a href="https://twitter.com/eyes_takamatsu" target="_blank" rel="noreferrer" className="section-card p-5 text-left transition hover:-translate-y-1">
                <p className="fluid-label font-bold tracking-[0.16em] text-[#c86b88]">総合管理者</p>

    function App() {
      const [view, setView] = useState("home");
      const [page, setPage] = useState("works");
      const [member, setMember] = useState("iori");
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedType, setSelectedType] = useState("すべて");
      const [selectedTag, setSelectedTag] = useState("すべて");
      const [showWatchedOnly, setShowWatchedOnly] = useState(false);
      const [watchedIds, setWatchedIds] = useState(loadWatchedIds);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(watchedIds));
      }, [watchedIds]);

      const current = MEMBER_BY_ID[member];
      const memberVideos = useMemo(() => VIDEO_DATA.filter((video) => video.memberId === member), [member]);
      const progress = memberProgress(member, watchedIds);

      const filteredVideos = useMemo(() => {
        const normalized = searchQuery.trim().toLowerCase();
        return memberVideos.filter((video) => {
          const text = `${video.title} ${video.comment} ${video.type} ${video.tags.join(" ")} ${current.name} ${current.en}`.toLowerCase();
          if (selectedType !== "すべて" && video.type !== selectedType) return false;
          if (selectedTag !== "すべて" && !video.tags.includes(selectedTag)) return false;
          if (showWatchedOnly && !watchedIds.includes(video.id)) return false;
          if (normalized && !text.includes(normalized)) return false;
          return true;
        });
      }, [searchQuery, selectedType, selectedTag, showWatchedOnly, watchedIds, memberVideos, current]);

      const toggleWatched = (id) => {
        setWatchedIds((current) => current.includes(id) ? current.filter((item) => item !== id) : [...current, id]);
      };

      const resetFilters = () => {
        setSearchQuery("");
        setSelectedType("すべて");
        setSelectedTag("すべて");
        setShowWatchedOnly(false);
      };

      return (
        <div className="app-shell dual-bg selection:bg-deep selection:text-white">
          {view !== "home" && (
            <LegacyTopNav
              member={member}
              setMember={setMember}
              page={page}
              setPage={setPage}
              view={view}
              setView={setView}
              resetFilters={resetFilters}
            />
          )}
          {view === "member" && <LegacyProgress current={current} progress={progress} page={page} />}

          {view === "home" && (
            <HomeMemberIndex setMember={setMember} setPage={setPage} setView={setView} resetFilters={resetFilters} watchedIds={watchedIds} />
          )}

          {view === "privacy" && (
            <PrivacyPolicy setView={setView} />
          )}

          {view === "member" && (
          <main className="page-transition mx-auto max-w-7xl px-6 pb-8 pt-40 md:pt-44">
            {page === "works" && (
              <div key={`${member}-works`} className="animate-in">
                <MemberHero current={current} progress={progress} memberVideos={memberVideos} />
                <LegacyFilterBar
                  searchQuery={searchQuery}
                  setSearchQuery={setSearchQuery}
                  selectedType={selectedType}
                  setSelectedType={setSelectedType}
                  selectedTag={selectedTag}
                  setSelectedTag={setSelectedTag}
                  showWatchedOnly={showWatchedOnly}
                  setShowWatchedOnly={setShowWatchedOnly}
                  resetFilters={resetFilters}
                  filteredCount={filteredVideos.length}
                />
                <LegacyVideoGrid videos={filteredVideos} current={current} watchedIds={watchedIds} toggleWatched={toggleWatched} />
                <SourceNote />
              </div>
            )}

            {page === "about" && (
              <div key={`${member}-about`} className="animate-in">
                <LegacyProfile current={current} videos={memberVideos} />
                <SourceNote />
              </div>
            )}
          </main>
          )}
          <LegacyFooter setView={setView} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
